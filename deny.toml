[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "Zlib",
]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[advisories]
db-urls = ["https://github.com/rustsec/advisory-db"]
# cargo-deny 0.19+: vulnerability/unmaintained/yanked/notice moved to
# deny.toml [graph] or are handled by default deny/warn behavior.
# Only keep what the new schema accepts.

[sources]
unknown-registry = "deny"
unknown-git = "deny"
