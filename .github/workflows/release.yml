name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.1.10909125"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - runner: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          - runner: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - name: Build release binaries
        shell: bash
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p aira-cli -p aira-daemon -p aira-gui

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          STAGING="aira-${VERSION}-${{ matrix.target }}"
          mkdir -p "${STAGING}"

          cp "target/${{ matrix.target }}/release/aira" "${STAGING}/"
          cp "target/${{ matrix.target }}/release/aira-daemon" "${STAGING}/"
          cp "target/${{ matrix.target }}/release/aira-gui" "${STAGING}/"

          tar czf "${STAGING}.tar.gz" "${STAGING}"
          shasum -a 256 "${STAGING}.tar.gz" > "${STAGING}.tar.gz.sha256"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $staging = "aira-${version}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path $staging

          Copy-Item "target/${{ matrix.target }}/release/aira.exe" "$staging/"
          Copy-Item "target/${{ matrix.target }}/release/aira-daemon.exe" "$staging/"
          Copy-Item "target/${{ matrix.target }}/release/aira-gui.exe" "$staging/"

          Compress-Archive -Path "$staging/*" -DestinationPath "$staging.zip"
          $hash = (Get-FileHash "$staging.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $staging.zip" | Out-File -Encoding ascii "$staging.zip.sha256"

      - name: Build MSI installer (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          cargo install cargo-wix --version 0.3.9 --locked
          # WiX v3 ships preinstalled on windows-latest runners. Point
          # cargo-wix at it via the WIX env var.
          $env:WIX = "C:\Program Files (x86)\WiX Toolset v3.14"
          if (-not (Test-Path $env:WIX)) {
            $env:WIX = (Get-ChildItem "C:\Program Files (x86)" -Filter "WiX*" | Select-Object -First 1).FullName
          }
          cargo wix -p aira-gui --no-build --nocapture `
            --output "aira-$version-setup.msi"
          $hash = (Get-FileHash "aira-$version-setup.msi" -Algorithm SHA256).Hash.ToLower()
          "$hash  aira-$version-setup.msi" | Out-File -Encoding ascii "aira-$version-setup.msi.sha256"

      - name: Build .dmg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # create-dmg is a nice-to-have; hdiutil fallback is built in.
          brew install create-dmg || true
          chmod +x scripts/bundle-macos.sh
          ./scripts/bundle-macos.sh "${{ matrix.target }}" "$VERSION"
          # Move the outputs to the repo root so the upload glob picks them up.
          mv target/macos-bundle/Aira-*.dmg . 2>/dev/null || true
          mv target/macos-bundle/Aira-*.dmg.sha256 . 2>/dev/null || true

      - name: Build AppImage (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # linuxdeploy + GTK plugin
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-gtk/raw/master/linuxdeploy-plugin-gtk.sh
          chmod +x linuxdeploy-x86_64.AppImage linuxdeploy-plugin-gtk.sh
          sudo mv linuxdeploy-x86_64.AppImage /usr/local/bin/linuxdeploy
          sudo mv linuxdeploy-plugin-gtk.sh /usr/local/bin/linuxdeploy-plugin-gtk
          # AppImages need libfuse2 on ubuntu 22.04+
          sudo apt-get install -y libfuse2 || true

          chmod +x scripts/bundle-appimage.sh
          ./scripts/bundle-appimage.sh "$VERSION"
          mv target/appimage/Aira-*.AppImage . 2>/dev/null || true
          mv target/appimage/Aira-*.AppImage.sha256 . 2>/dev/null || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aira-${{ matrix.target }}
          path: |
            aira-*.${{ matrix.archive }}
            aira-*.${{ matrix.archive }}.sha256
            aira-*-setup.msi
            aira-*-setup.msi.sha256
            Aira-*.dmg
            Aira-*.dmg.sha256
            Aira-*.AppImage
            Aira-*.AppImage.sha256
          if-no-files-found: ignore

  android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Build libaira_ffi.so (arm64-v8a)
        run: |
          cargo ndk --target aarch64-linux-android --platform 26 \
            -- build -p aira-ffi --release

      - name: Build libaira_ffi.so (x86_64)
        run: |
          cargo ndk --target x86_64-linux-android --platform 26 \
            -- build -p aira-ffi --release

      - name: Copy .so to jniLibs
        run: |
          mkdir -p mobile/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p mobile/android/app/src/main/jniLibs/x86_64
          cp target/aarch64-linux-android/release/libaira_ffi.so \
            mobile/android/app/src/main/jniLibs/arm64-v8a/
          cp target/x86_64-linux-android/release/libaira_ffi.so \
            mobile/android/app/src/main/jniLibs/x86_64/

      - name: Generate Kotlin bindings
        run: |
          cargo build -p aira-ffi
          cargo run -p aira-ffi --bin uniffi-bindgen -- \
            generate --library target/debug/libaira_ffi.so \
            --language kotlin \
            --out-dir mobile/android/app/src/main/kotlin/

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Update version in build.gradle.kts
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          # Compute versionCode from semver: major*10000 + minor*100 + patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "${VERSION%%-*}"
          VERSION_CODE=$((MAJOR * 10000 + MINOR * 100 + PATCH))
          sed -i "s/versionCode = .*/versionCode = ${VERSION_CODE}/" \
            mobile/android/app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${VERSION}\"/" \
            mobile/android/app/build.gradle.kts

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        working-directory: mobile/android
        run: gradle assembleRelease

      - name: Package APK
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          APK_SRC="mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          APK_NAME="aira-${VERSION}-android.apk"
          cp "${APK_SRC}" "${APK_NAME}"
          sha256sum "${APK_NAME}" > "${APK_NAME}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: aira-android
          path: |
            aira-*-android.apk
            aira-*-android.apk.sha256

  release:
    name: Create GitHub Release
    needs: [build, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/aira-*.tar.gz
            artifacts/aira-*.zip
            artifacts/aira-*.apk
            artifacts/aira-*-setup.msi
            artifacts/Aira-*.dmg
            artifacts/Aira-*.AppImage
            artifacts/*.sha256
