name: Android Build

on:
  push:
    branches: [main, dev, "milestone/M10-*"]
    paths:
      - "crates/aira-ffi/**"
      - "mobile/android/**"
      - ".github/workflows/android.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "crates/aira-ffi/**"
      - "mobile/android/**"

env:
  CARGO_TERM_COLOR: always
  ANDROID_NDK_VERSION: "26.1.10909125"

jobs:
  # Job 1: Cross-compile Rust .so for Android targets
  rust-android-lib:
    name: Build Rust .so (Android)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - aarch64-linux-android
          - x86_64-linux-android
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: x86_64-linux-android
            abi: x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Set up Android NDK
        uses: android-actions/setup-android@v3
        with:
          packages: "ndk;${{ env.ANDROID_NDK_VERSION }}"

      - name: Build libaira_ffi.so
        run: |
          cargo ndk \
            --target ${{ matrix.target }} \
            --platform 26 \
            -- build -p aira-ffi --release

      - name: Upload .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: libaira_ffi-${{ matrix.abi }}
          path: target/${{ matrix.target }}/release/libaira_ffi.so

  # Job 2: Generate Kotlin bindings with uniffi-bindgen
  uniffi-bindgen:
    name: Generate Kotlin Bindings
    runs-on: ubuntu-latest
    needs: rust-android-lib
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build aira-ffi (host) for bindgen
        run: cargo build -p aira-ffi

      - name: Generate Kotlin bindings
        run: |
          cargo run -p aira-ffi --bin uniffi-bindgen -- \
            generate --library target/debug/libaira_ffi.so \
            --language kotlin \
            --out-dir mobile/android/app/src/main/kotlin/

      - name: Upload Kotlin bindings
        uses: actions/upload-artifact@v4
        with:
          name: kotlin-bindings
          path: mobile/android/app/src/main/kotlin/uniffi/

  # Job 3: Build APK
  android-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: [rust-android-lib, uniffi-bindgen]
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Download arm64-v8a .so
        uses: actions/download-artifact@v4
        with:
          name: libaira_ffi-arm64-v8a
          path: mobile/android/app/src/main/jniLibs/arm64-v8a/

      - name: Download x86_64 .so
        uses: actions/download-artifact@v4
        with:
          name: libaira_ffi-x86_64
          path: mobile/android/app/src/main/jniLibs/x86_64/

      - name: Download Kotlin bindings
        uses: actions/download-artifact@v4
        with:
          name: kotlin-bindings
          path: mobile/android/app/src/main/kotlin/uniffi/

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        working-directory: mobile/android
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: aira-debug.apk
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk

  # Job 4: Rust tests (FFI crate)
  rust-tests:
    name: Rust Tests (aira-ffi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test -p aira-ffi

      - name: Run clippy
        run: cargo clippy -p aira-ffi -- -D warnings
