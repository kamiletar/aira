# cargo-audit configuration.
#
# See https://github.com/rustsec/rustsec/tree/main/cargo-audit for the
# schema. Keep the ignore list in sync with deny.toml [advisories].

[advisories]
ignore = [
    # RUSTSEC-2025-0144 — Timing side-channel in ML-DSA decomposition.
    # Requires ml-dsa 0.0.4 → 0.1.0-rc.3 (breaking API change). Scheduled
    # for v0.3.6. Low severity for our threat model because signing runs
    # behind Zeroizing<> and is not called on attacker-influenced timing.
    "RUSTSEC-2025-0144",

    # Transitive unmaintained-crate warnings we don't own. See deny.toml
    # for the full rationale; kept in sync here so cargo-audit and
    # cargo-deny agree on the ignore set.
    "RUSTSEC-2024-0370",  # proc-macro-error
    "RUSTSEC-2024-0384",  # instant
    "RUSTSEC-2024-0388",  # derivative
    "RUSTSEC-2024-0436",  # paste
    "RUSTSEC-2025-0141",  # yaml-rust (insta)
    "RUSTSEC-2024-0320",  # yaml-rust (older id)
    "RUSTSEC-2024-0412",  # atk
    "RUSTSEC-2024-0413",  # atk-sys
    "RUSTSEC-2024-0414",  # gdk
    "RUSTSEC-2024-0415",  # gdk-sys
    "RUSTSEC-2024-0416",  # gdkwayland-sys
    "RUSTSEC-2024-0417",  # gdkx11
    "RUSTSEC-2024-0418",  # gdkx11-sys
    "RUSTSEC-2024-0419",  # gtk
    "RUSTSEC-2024-0420",  # gtk-sys
    "RUSTSEC-2024-0421",  # gtk3-macros
    "RUSTSEC-2024-0422",  # atk3
    "RUSTSEC-2023-0089",  # atomic-polyfill
    "RUSTSEC-2023-0071",  # rsa (not used directly)
    "RUSTSEC-2024-0429",  # glib unsound VariantStrIter — gtk3 ecosystem
    "RUSTSEC-2026-0002",  # lru IterMut Stacked Borrows — ratatui transitive
]
